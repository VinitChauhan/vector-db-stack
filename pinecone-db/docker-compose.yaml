# filepath: pinecone-ui/docker-compose.yaml
services:
  pinecone-local:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    container_name: pinecone-local
    environment:
      PORT: 5080
      PINECONE_HOST: localhost
    ports:
      - "5080-5090:5080-5090"
    platform: linux/amd64
    restart: unless-stopped

  pinecone-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pinecone-admin-ui
    ports:
      - "8501:8501"
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - PINECONE_HOST=pinecone-local:5080
    depends_on:
      - pinecone-local